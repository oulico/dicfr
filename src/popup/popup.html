<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 200px;
      max-height: 500px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #111;
      background: #fff;
    }
    header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 15px;
      font-weight: 600;
    }
    #count {
      font-size: 11px;
      color: #888;
    }
    #search-bar {
      padding: 8px 14px;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 0;
    }
    #search-input {
      flex: 1;
      padding: 5px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      outline: none;
    }
    #search-input:focus {
      border-color: #999;
    }
    #search-result {
      display: none;
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
      background: #fafbfc;
    }
    #search-result.visible {
      display: block;
    }
    .sr-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .sr-back {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #888;
      padding: 0 4px;
    }
    .sr-back:hover { color: #333; }
    .sr-word {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
    }
    .sr-pos {
      font-size: 11px;
      color: #888;
    }
    .sr-defs {
      margin: 4px 0;
    }
    .sr-def {
      margin: 3px 0;
      font-size: 13px;
      color: #333;
    }
    .sr-example {
      font-size: 12px;
      color: #666;
      font-style: italic;
      margin-top: 6px;
    }
    .sr-similar {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #eee;
    }
    .sr-similar-label {
      font-size: 10px;
      color: #aaa;
      margin-bottom: 4px;
    }
    .sr-similar-words {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .sr-link {
      color: #2563eb;
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px dotted #93b5f5;
    }
    .sr-link:hover {
      color: #1d4ed8;
      border-bottom-style: solid;
    }
    .sr-not-found {
      color: #999;
      font-size: 12px;
    }
    #stats {
      font-size: 10px;
      color: #aaa;
      padding: 4px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    #empty {
      display: none;
      padding: 40px 14px;
      text-align: center;
      color: #aaa;
      font-size: 12px;
    }
    #word-list {
      overflow-y: auto;
      max-height: 420px;
    }
    .word-item {
      padding: 8px 14px;
      border-bottom: 1px solid #f5f5f5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 8px;
    }
    .word-item:hover {
      background: #fafafa;
    }
    .word {
      font-weight: 600;
      color: #1a1a2e;
    }
    .delete-btn {
      grid-row: 1 / 3;
      grid-column: 2;
      align-self: center;
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }
    .delete-btn:hover {
      color: #e44;
    }
    .definition {
      grid-column: 1;
      color: #444;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta {
      grid-column: 1;
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .time {
      font-size: 10px;
      color: #bbb;
    }
    .lookup-count {
      font-size: 10px;
      color: #aaa;
      background: #f5f5f5;
      padding: 0 4px;
      border-radius: 3px;
    }
    #download-section {
      display: none;
      padding: 12px 14px;
      border-bottom: 1px solid #eee;
      background: #fafbfc;
    }
    #download-section.visible {
      display: block;
    }
    .dl-label {
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
    }
    #dl-btn {
      width: 100%;
      padding: 6px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
    }
    #dl-btn:hover {
      background: #f0f0f0;
    }
    #dl-btn:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .dl-progress {
      display: none;
      margin-top: 4px;
    }
    .dl-progress.visible {
      display: block;
    }
    .dl-bar-bg {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
    }
    .dl-bar {
      height: 100%;
      background: #4a9;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }
    .dl-status {
      font-size: 10px;
      color: #888;
      margin-top: 4px;
    }
    .dl-error {
      font-size: 11px;
      color: #c44;
      margin-top: 4px;
    }
    #actions {
      padding: 6px 14px;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 6px;
    }
    .action-btn {
      flex: 1;
      padding: 5px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      color: #555;
    }
    .action-btn:hover {
      background: #f5f5f5;
      color: #111;
    }
    #import-file {
      display: none;
    }
    #import-status {
      font-size: 11px;
      color: #4a9;
      padding: 4px 14px;
      display: none;
    }
    #sync-section {
      padding: 8px 14px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    #sync-email {
      color: #888;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sync-btn {
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      font-size: 11px;
      cursor: pointer;
      color: #555;
    }
    .sync-btn:hover { background: #f5f5f5; }
    .sync-btn:disabled { opacity: 0.5; cursor: default; }
    #sync-msg {
      font-size: 10px;
      color: #4a9;
      padding: 2px 14px;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>dicfr</h1>
    <span id="count"></span>
  </header>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Search a word..." autocomplete="off" />
  </div>
  <div id="search-result"></div>
  <div id="stats"></div>
  <div id="download-section">
    <div class="dl-label">Download full dictionary (~550 MB)</div>
    <button id="dl-btn" type="button">Download Dictionary</button>
    <div id="dl-progress" class="dl-progress">
      <div class="dl-bar-bg"><div id="dl-bar" class="dl-bar"></div></div>
      <div id="dl-status" class="dl-status"></div>
    </div>
    <div id="dl-error" class="dl-error"></div>
  </div>
  <div id="sync-section">
    <button id="sync-login-btn" class="sync-btn" type="button">Sign in</button>
    <span id="sync-email"></span>
    <button id="sync-btn" class="sync-btn" type="button" style="display:none">Sync</button>
    <button id="sync-logout-btn" class="sync-btn" type="button" style="display:none">Sign out</button>
  </div>
  <div id="sync-msg"></div>
  <div id="actions">
    <button id="export-btn" class="action-btn" type="button">Export</button>
    <button id="import-btn" class="action-btn" type="button">Import</button>
    <input id="import-file" type="file" accept=".json" />
  </div>
  <div id="import-status"></div>
  <div id="empty">
    Select a French word on any page to look it up.
  </div>
  <div id="word-list"></div>
  <script src="popup.js" type="module"></script>
</body>
</html>
